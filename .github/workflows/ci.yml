name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build & test (macOS, Node ${{ matrix.node }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
